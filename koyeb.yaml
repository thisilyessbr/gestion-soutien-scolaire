name: gestion-soutien-scolaire
service:
  type: web
  git:
    branch: main
    build:
      dockerfile: Dockerfile
  ports:
    - port: 8080
      protocol: http
      routes:
        - path: /
  env:
    - name: JAVA_OPTS
      value: -Xmx256m
    - name: DB_HOST
      value: localhost
    - name: DB_PORT
      value: "3306"
    - name: DB_NAME
      value: gestion_du_soutien
    - name: DB_USER
      value: appuser
    - name: DB_PASS
      value: apppass
    - name: DB_USE_SSL
      value: "false"
  instance_type: free
  scaling:
    min: 1
    max: 1
