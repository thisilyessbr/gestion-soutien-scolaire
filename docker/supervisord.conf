[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:mysql]
command=/usr/local/bin/init-mysql.sh
autostart=true
autorestart=true
stdout_logfile=/var/log/mysql.log
stderr_logfile=/var/log/mysql.err

[program:tomcat]
command=/usr/local/tomcat/bin/catalina.sh run
autostart=false
autorestart=true
stdout_logfile=/var/log/tomcat.log
stderr_logfile=/var/log/tomcat.err
